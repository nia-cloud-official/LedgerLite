<!DOCTYPE html>
<html>
<head>

    <title>LedgerLite</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">

<style>

/* ================= GLOBAL ================= */
:root {
    --bg: #0b1220;
    --surface: rgba(255,255,255,0.03);
    --border: rgba(255,255,255,0.08);
    --text: #e5e7eb;
    --muted: #9ca3af;
    --primary: #3b82f6;
}

body {
    min-height: 100vh;
    display: flex;
    flex-direction: column;

    background:
        radial-gradient(circle at 20% 10%, rgba(59,130,246,0.10), transparent 45%),
        radial-gradient(circle at 80% 80%, rgba(34,197,94,0.08), transparent 40%),
        var(--bg);

    color: var(--text);
}

/* ================= NAVBAR (FIXED STACKING) ================= */
.navbar {
    background: rgba(17, 24, 39, 0.72);
    backdrop-filter: blur(18px);

    border-bottom: 1px solid rgba(255,255,255,0.06);

    position: sticky;
    top: 0;

    z-index: 9999; /* 🔥 CRITICAL FIX */
}

/* nav links */
.nav-link {
    color: rgba(255,255,255,0.75) !important;
}
.nav-link:hover {
    color: #fff !important;
}

/* ================= USER AVATAR ================= */
.user-avatar {
    width: 42px;
    height: 42px;
    border-radius: 50%;
    border: none;
    padding: 0;

    display: flex;
    align-items: center;
    justify-content: center;

    overflow: hidden;
    background: linear-gradient(135deg,#22c55e,#16a34a);

    position: relative;
    z-index: 10000;
}

.user-avatar img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* remove bootstrap arrow */
.user-avatar::after {
    display: none !important;
}

/* ================= DROPDOWN FIX (REAL ISSUE FIX) ================= */
.dropdown {
    position: relative;
    z-index: 10000;
}

.dropdown-menu {
    background: rgba(15, 23, 42, 0.97) !important;
    border: 1px solid var(--border) !important;
    border-radius: 14px;
    padding: 8px;

    backdrop-filter: blur(20px);

    box-shadow: 0 25px 60px rgba(0,0,0,0.6);

    z-index: 10001 !important; /* 🔥 ABOVE EVERYTHING */
}

.dropdown-item {
    color: var(--text) !important;
    border-radius: 10px;
    padding: 10px 12px;
}

.dropdown-item:hover {
    background: rgba(59,130,246,0.15) !important;
    transform: translateX(3px);
}

/* ================= INPUT FIX ================= */
.form-control,
.form-select {
    background: rgba(255,255,255,0.04) !important;
    border: 1px solid var(--border) !important;
    color: var(--text) !important;
    border-radius: 12px;
}

.form-control:focus,
.form-select:focus {
    background: rgba(255,255,255,0.06) !important;
    border-color: var(--primary) !important;
    box-shadow: 0 0 0 3px rgba(59,130,246,0.15) !important;
    color: #fff !important;
}

.form-control::placeholder {
    color: rgba(229,231,235,0.4) !important;
}

.form-select {
    color-scheme: dark;
}

/* ================= SAFETY LAYERING FIX ================= */
.container {
    position: relative;
    z-index: 1;
}

/* prevent cards breaking dropdown stacking */
.card, .saas-card, .table-card {
    position: relative;
    z-index: 1;
}

/* ================= FOOTER ================= */
footer {
    margin-top: auto;
    padding: 22px;
    text-align: center;
    color: var(--muted);
    background: rgba(15,23,42,0.6);
    border-top: 1px solid rgba(255,255,255,0.06);
}

</style>

</head>

<body>

<nav class="navbar navbar-dark navbar-expand">

    <div class="container">

        <a class="navbar-brand fw-bold" href="{% url 'dashboard' %}">
            LedgerLite
        </a>

        <div class="ms-auto d-flex align-items-center gap-3">

            <a class="nav-link" href="{% url 'dashboard' %}">
                <i class="bi bi-speedometer2 me-1"></i> Dashboard
            </a>

            <a class="nav-link" href="{% url 'create_invoice' %}">
                <i class="bi bi-plus-circle me-1"></i> Invoice
            </a>

            <!-- USER DROPDOWN -->
            <div class="dropdown">

                <button class="user-avatar dropdown-toggle"
                        data-bs-toggle="dropdown"
                        type="button">
                    {% if request.user.companyprofile and request.user.companyprofile.company_logo %}
                        <img src="{{ request.user.companyprofile.company_logo.url }}">
                    {% else %}
                        <span>{{ request.user.username|first|upper }}</span>
                    {% endif %}
                </button>

                <ul class="dropdown-menu dropdown-menu-end">

                    <li>
                        <a class="dropdown-item" href="{% url 'profile' %}">
                            <i class="bi bi-person me-2"></i> Profile
                        </a>
                    </li>

                    <li>
                        <a class="dropdown-item" href="{% url 'products' %}">
                            <i class="bi bi-box me-2"></i> Inventory
                        </a>
                    </li>

                    <li>
                        <a class="dropdown-item" href="{% url 'add_product' %}">
                            <i class="bi bi-plus-circle me-2"></i> Add Product
                        </a>
                    </li>

                    <li><hr class="dropdown-divider"></li>

                    <li>
                        <a class="dropdown-item text-danger" href="{% url 'logout' %}">
                            <i class="bi bi-box-arrow-right me-2"></i> Logout
                        </a>
                    </li>

                </ul>

            </div>

        </div>

    </div>
</nav>

<div class="container mt-4">
    {% block content %}{% endblock %}
</div>

<footer>
    <strong>LedgerLite</strong><br>
    © 2026 — Premium Business System
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
