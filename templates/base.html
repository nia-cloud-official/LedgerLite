<!DOCTYPE html>
<html>
<head>

    <title>LedgerLite</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">

<style>

/* ================= GLOBAL ================= */
:root{
    --bg:#0b1220;
    --surface:rgba(255,255,255,.03);
    --border:rgba(255,255,255,.08);
    --text:#e5e7eb;
    --muted:#9ca3af;
    --primary:#3b82f6;
}

html,
body{
    min-height:100%;
}

body{
    display:flex;
    flex-direction:column;

    background:
        radial-gradient(circle at 20% 10%, rgba(59,130,246,.10), transparent 45%),
        radial-gradient(circle at 80% 80%, rgba(34,197,94,.08), transparent 40%),
        var(--bg);

    color:var(--text);
}

/* ================= NAVBAR ================= */

.navbar{
    background:rgba(17,24,39,.80);
    backdrop-filter:blur(18px);

    border-bottom:1px solid rgba(255,255,255,.06);

    position:sticky;
    top:0;

    z-index:9999;
}

.navbar-brand{
    font-weight:700;
    color:#fff !important;
}

.nav-link{
    color:rgba(255,255,255,.78) !important;
    transition:.2s;
}

.nav-link:hover{
    color:#fff !important;
}

/* Mobile hamburger */

.navbar-toggler{
    border:1px solid rgba(255,255,255,.15);
}

.navbar-toggler:focus{
    box-shadow:none;
}

/* ================= USER AVATAR ================= */

.user-avatar{
    width:42px;
    height:42px;

    border:none;
    border-radius:50%;

    overflow:hidden;

    display:flex;
    align-items:center;
    justify-content:center;

    background:linear-gradient(
        135deg,
        #22c55e,
        #16a34a
    );

    color:white;
    font-weight:700;

    padding:0;
}

/* IMPORTANT:
   preserves uploaded logo correctly
*/
.user-avatar img{
    width:100%;
    height:100%;
    object-fit:cover;
    display:block;
}

.user-avatar::after{
    display:none !important;
}

/* ================= DROPDOWN ================= */

.dropdown{
    position:relative;
}

.dropdown-menu{
    background:rgba(15,23,42,.98) !important;

    border:1px solid var(--border) !important;
    border-radius:14px;

    padding:8px;

    backdrop-filter:blur(20px);

    box-shadow:
        0 25px 60px rgba(0,0,0,.60);

    z-index:10001 !important;
}

.dropdown-item{
    color:var(--text) !important;

    border-radius:10px;

    padding:10px 12px;

    transition:.2s;
}

.dropdown-item:hover{
    background:rgba(59,130,246,.15) !important;
}

.dropdown-divider{
    border-color:rgba(255,255,255,.08);
}

/* ================= FORMS ================= */

.form-control,
.form-select{
    background:rgba(255,255,255,.04) !important;
    border:1px solid var(--border) !important;
    color:var(--text) !important;
    border-radius:12px;
}

.form-control:focus,
.form-select:focus{
    background:rgba(255,255,255,.06) !important;
    border-color:var(--primary) !important;

    box-shadow:
        0 0 0 3px rgba(59,130,246,.15) !important;

    color:#fff !important;
}

.form-control::placeholder{
    color:rgba(229,231,235,.45);
}

.form-select{
    color-scheme:dark;
}

/* ================= CONTENT ================= */

.main-content{
    flex:1;
}

.container{
    position:relative;
    z-index:1;
}

.card,
.table-card,
.saas-card{
    position:relative;
    z-index:1;
}

/* ================= FOOTER ================= */

footer{
    margin-top:auto;

    padding:24px;

    text-align:center;

    color:var(--muted);

    background:rgba(15,23,42,.65);

    border-top:
        1px solid rgba(255,255,255,.06);
}

/* ================= MOBILE ================= */

@media (max-width: 991px){

    .navbar-collapse{
        padding-top:15px;
    }

    .navbar-nav{
        gap:6px;
    }

    .nav-link{
        padding:.7rem 0;
    }

    .user-avatar{
        width:40px;
        height:40px;
    }

    .dropdown-menu{
        min-width:220px;
    }

    .container{
        padding-left:16px;
        padding-right:16px;
    }
}

@media (max-width: 576px){

    footer{
        font-size:.9rem;
    }

    .dropdown-menu{
        width:220px;
    }
}

</style>

</head>

<body>

<nav class="navbar navbar-dark navbar-expand-lg">

    <div class="container">

        <a class="navbar-brand" href="{% url 'dashboard' %}">
            LedgerLite
        </a>

        <button
            class="navbar-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#mainNavbar">

            <span class="navbar-toggler-icon"></span>

        </button>

        <div class="collapse navbar-collapse" id="mainNavbar">

            <div class="ms-auto d-flex align-items-center gap-3 flex-wrap">

                {% if user.is_authenticated %}

                <a class="nav-link" href="{% url 'dashboard' %}">
                    <i class="bi bi-speedometer2 me-1"></i>
                    Dashboard
                </a>

                <a class="nav-link" href="{% url 'create_invoice' %}">
                    <i class="bi bi-plus-circle me-1"></i>
                    Invoice
                </a>

                <div class="dropdown">

                    <button
                        class="user-avatar dropdown-toggle"
                        type="button"
                        data-bs-toggle="dropdown">

                        {% if request.user.companyprofile and request.user.companyprofile.company_logo %}
                            <img src="{{ request.user.companyprofile.company_logo.url }}" alt="Logo">
                        {% else %}
                            {{ request.user.username|first|upper }}
                        {% endif %}

                    </button>

                    <ul class="dropdown-menu dropdown-menu-end">

                        <li>
                            <a class="dropdown-item" href="{% url 'profile' %}">
                                <i class="bi bi-person me-2"></i>
                                Profile
                            </a>
                        </li>

                        <li>
                            <a class="dropdown-item" href="{% url 'products' %}">
                                <i class="bi bi-box me-2"></i>
                                Inventory
                            </a>
                        </li>

                        <li>
                            <a class="dropdown-item" href="{% url 'add_product' %}">
                                <i class="bi bi-plus-circle me-2"></i>
                                Add Product
                            </a>
                        </li>

                        <li>
                            <hr class="dropdown-divider">
                        </li>

                        <li>
                            <a class="dropdown-item text-danger" href="{% url 'logout' %}">
                                <i class="bi bi-box-arrow-right me-2"></i>
                                Logout
                            </a>
                        </li>

                    </ul>

                </div>

                {% endif %}

            </div>

        </div>

    </div>

</nav>

<div class="container mt-4 main-content">
    {% block content %}{% endblock %}
</div>

<footer>
    <strong>LedgerLite</strong><br>
    © 2026 — Premium Business System
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
