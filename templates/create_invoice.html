<!DOCTYPE html>
<html>
<head>
    <title>Create Invoice - LedgerLite</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

/* ================= SYSTEM (CONTROLLED COLORS) ================= */
:root {
    --bg: #0b1220;
    --surface: rgba(255,255,255,0.03);
    --surface-hover: rgba(255,255,255,0.05);
    --border: rgba(255,255,255,0.08);
    --text: #e5e7eb;
    --muted: #9ca3af;

    --primary: #3b82f6;   /* ONLY for main action */
    --danger: #ef4444;    /* ONLY for delete/cancel */
    --success: #22c55e;   /* ONLY for confirmation */
}

/* ================= PAGE ================= */
body {
    min-height: 100vh;
    background: var(--bg);
    color: var(--text);
}

/* ================= MAIN CARD ================= */
.invoice-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px;
}

/* ================= HEADER ================= */
.header-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
}

h2 {
    font-weight: 700;
    letter-spacing: -0.3px;
}

.muted-text {
    font-size: 13px;
    color: var(--muted);
}

/* ================= PRIMARY ACTION (ONLY ONE BLUE) ================= */
.btn-primary-action {
    background: var(--primary);
    border: none;
    border-radius: 10px;
    font-weight: 600;
    padding: 10px 16px;
    color: white;
}

.btn-primary-action:hover {
    opacity: 0.9;
}

/* ================= FORM FIX (SELECT + INPUTS) ================= */
.form-control,
.form-select {
    background: rgba(15, 23, 42, 0.9) !important; /* darker solid base */
    border: 1px solid rgba(255,255,255,0.12) !important;
    color: #e5e7eb !important;
    border-radius: 10px;
}

/* 🔥 FORCE SELECT TEXT VISIBILITY */
.form-select {
    color: #e5e7eb !important;
    background-color: #0f172a !important;
    appearance: none;
    -webkit-appearance: none;
    -moz-appearance: none;
}

/* 🔥 OPTION FIX (MOST IMPORTANT PART) */
.form-select option {
    background-color: #0b1220 !important;
    color: #ffffff !important;
}

/* hover highlight inside dropdown */
.form-select option:hover,
.form-select option:checked {
    background-color: #1d4ed8 !important;
    color: #ffffff !important;
}

/* focus state */
.form-control:focus,
.form-select:focus {
    border-color: #3b82f6 !important;
    box-shadow: 0 0 0 3px rgba(59,130,246,0.2) !important;
    background: #0f172a !important;
    color: #ffffff !important;
}

/* placeholder safety */
.form-control::placeholder {
    color: rgba(229,231,235,0.55) !important;
}

/* labels must be neutral */
.form-label {
    color: var(--muted);
    font-size: 13px;
}

/* ================= ITEM ROWS ================= */
.item-row {
    background: rgba(255,255,255,0.02);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px;
    margin-bottom: 10px;
}

/* hover subtle ONLY */
.item-row:hover {
    background: var(--surface-hover);
}

/* ================= BUTTONS ================= */
.btn-success {
    background: var(--success);
    border: none;
    border-radius: 10px;
    font-weight: 600;
}

.btn-outline-danger {
    border-radius: 10px;
    border-color: var(--border);
    color: var(--text);
    background: transparent;
}

.btn-outline-danger:hover {
    background: rgba(239,68,68,0.15);
    border-color: var(--danger);
    color: white;
}

/* ================= ADD ITEM ================= */
#add-item {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 10px;
    padding: 8px 12px;
}

#add-item:hover {
    background: var(--surface-hover);
}

/* ================= DIVIDER ================= */
hr {
    border-color: var(--border);
}

/* ================= REMOVE BUTTON ================= */
.remove-item {
    border-radius: 10px;
}

</style>

</head>

<body>

<div class="container mt-5">

    <div class="invoice-card">

        <!-- HEADER -->
        <div class="header-bar">

            <div>
                <h2>Create Invoice</h2>
                <div class="muted-text">Add customer and invoice items</div>
            </div>

            <a href="{% url 'dashboard' %}" class="btn btn-outline-danger btn-sm">
                Cancel
            </a>

        </div>

        <form method="POST">
            {% csrf_token %}

            <!-- CUSTOMER -->
            <div class="row mb-3">

                <div class="col-md-6">
                    <label class="form-label">Customer Name</label>
                    <input class="form-control" name="customer_name" required>
                </div>

                <div class="col-md-6">
                    <label class="form-label">Customer Phone</label>
                    <input class="form-control" name="customer_phone">
                </div>

            </div>

            <hr>

            <h6 class="mb-3">Invoice Items</h6>

            <div id="items">

                <div class="row item-row align-items-end">

                    <div class="col-md-5">
                        <label class="form-label">Product</label>
                        <select class="form-select product-select" name="product_id[]">
                            <option value="">Select Product</option>
                            {% for product in products %}
                                <option value="{{ product.id }}" data-price="{{ product.price }}">
                                    {{ product.name }}
                                </option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="col-md-2">
                        <label class="form-label">Qty</label>
                        <input class="form-control qty" name="quantity[]" type="number" min="1" value="1">
                    </div>

                    <div class="col-md-3">
                        <label class="form-label">Price</label>
                        <input class="form-control price" name="price[]" readonly>
                    </div>

                    <div class="col-md-2">
                        <button type="button" class="btn btn-outline-danger w-100 remove-item">
                            ×
                        </button>
                    </div>

                </div>

            </div>

            <!-- ADD -->
            <button type="button" id="add-item" class="mt-3">
                + Add Item
            </button>

            <hr>

            <!-- SAVE -->
            <div class="d-flex justify-content-end">

                <button type="submit" class="btn btn-success px-4">
                    Save Invoice
                </button>

            </div>

        </form>

    </div>

</div>

<script>

document.getElementById("add-item").addEventListener("click", function () {

    const row = document.querySelector(".item-row").cloneNode(true);

    row.querySelectorAll("input, select").forEach(el => {
        if (el.tagName === "INPUT") el.value = el.classList.contains("qty") ? 1 : "";
        if (el.tagName === "SELECT") el.selectedIndex = 0;
    });

    document.getElementById("items").appendChild(row);
});

document.addEventListener("change", function (e) {
    if (e.target.classList.contains("product-select")) {
        let price = e.target.selectedOptions[0].dataset.price || 0;
        e.target.closest(".item-row").querySelector(".price").value = price;
    }
});

document.addEventListener("click", function (e) {
    if (e.target.classList.contains("remove-item")) {
        let rows = document.querySelectorAll(".item-row");
        if (rows.length > 1) e.target.closest(".item-row").remove();
    }
});

</script>

</body>
</html>
