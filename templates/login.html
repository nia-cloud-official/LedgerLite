<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login | LedgerLite</title>



<style>

:root {

  --bg: #f8fafc;

  --card: rgba(255,255,255,0.85);

  --text: #0f172a;

  --muted: #475569;

  --input: #ffffff;

  --border: rgba(15,23,42,0.12);

  --primary: #2563eb;

  --shadow: rgba(0,0,0,0.08);

}



body.dark {

  --bg: #0b1220;

  --card: rgba(15,23,42,0.75);

  --text: #f8fafc;

  --muted: #cbd5e1;

  --input: rgba(15,23,42,0.8);

  --border: rgba(255,255,255,0.12);

  --primary: #3b82f6;

  --shadow: rgba(0,0,0,0.6);

}



body {

  margin: 0;

  min-height: 100vh;

  display: flex;

  align-items: center;

  justify-content: center;

  font-family: system-ui, sans-serif;

  background:

    radial-gradient(circle at top left, rgba(59,130,246,0.12), transparent 40%),

    radial-gradient(circle at bottom right, rgba(16,185,129,0.10), transparent 40%),

    var(--bg);

  transition: 0.3s;

}



.wrapper {

  width: 100%;

  max-width: 460px;

  padding: 20px;

}



.form {

  display: flex;

  flex-direction: column;

  gap: 12px;

  background: var(--card);

  backdrop-filter: blur(18px);

  padding: 35px;

  border-radius: 18px;

  border: 1px solid var(--border);

  box-shadow: 0 25px 70px var(--shadow);

  color: var(--text);

}



.flex-column > label {

  font-weight: 600;

  font-size: 14px;

  color: var(--text);

}



.inputForm {

  border: 1px solid var(--border);

  border-radius: 12px;

  height: 52px;

  display: flex;

  align-items: center;

  padding: 0 12px;

  background: var(--input);

}



.inputForm:focus-within {

  border-color: var(--primary);

  box-shadow: 0 0 0 3px rgba(37,99,235,0.15);

}



.input {

  width: 100%;

  border: none;

  background: transparent;

  margin-left: 10px;

  color: var(--text);

}



.input:focus {

  outline: none;

}



.button-submit {

  height: 52px;

  border: none;

  border-radius: 12px;

  background: linear-gradient(135deg, var(--primary), #1d4ed8);

  color: #fff;

  font-weight: 700;

  cursor: pointer;

}



.p {

  text-align: center;

  font-size: 13px;

  color: var(--muted);

}



.span {

  color: var(--primary);

  cursor: pointer;

}



.topbar {

  display: flex;

  justify-content: space-between;

  align-items: center;

  margin-bottom: 10px;

}



.toggle {

  border: 1px solid var(--border);

  background: var(--input);

  color: var(--text);

  padding: 6px 10px;

  border-radius: 10px;

  cursor: pointer;

  font-size: 12px;

}



.logo {

  display: flex;

  justify-content: center;

  margin-bottom: 10px;

}



.logo img {

  width: 70px;

  height: 70px;

  object-fit: contain;

}



/* input icons */

.icon {

  width: 18px;

  height: 18px;

  flex-shrink: 0;

  opacity: 0.7;

}

</style>

</head>



<body>



<div class="wrapper">



<form class="form" method="POST">
<button type="button" style="width:70px;" class="toggle" onclick="toggleTheme()">Theme</button>
{% csrf_token %}



<!-- LOGO (PNG) -->

<div class="logo">

<img src="/static/logo-nobg.png" alt="LedgerLite Logo">
</div>


<div class="topbar">



</div>


<p class="p">Welcome back to LedgerLite</p>



<div class="flex-column">

<label>Email</label>

</div>



<div class="inputForm">

<svg class="icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">

<path d="M4 4h16v16H4V4z" stroke="currentColor" stroke-width="2"/>

<path d="M4 7l8 6 8-6" stroke="currentColor" stroke-width="2"/>

</svg>

<input type="text" name="username" class="input" placeholder="Email or username" required>

</div>



<div class="flex-column">

<label>Password</label>

</div>



<div class="inputForm">

<svg class="icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">

<path d="M7 10V7a5 5 0 0110 0v3" stroke="currentColor" stroke-width="2"/>

<path d="M6 10h12v10H6V10z" stroke="currentColor" stroke-width="2"/>

</svg>

<input type="password" name="password" class="input" placeholder="Password" required>

</div>



<button class="button-submit" type="submit">Sign In</button>



<p class="p">

Don't have an account? <span class="span">{% url 'register' %}</span>

</p>



</form>



</div>



<script>

function toggleTheme(){

document.body.classList.toggle("dark");

if(document.body.classList.contains("dark")){

localStorage.setItem("theme","dark");

}else{

localStorage.setItem("theme","light");

}

}



window.onload = () => {

if(localStorage.getItem("theme")==="dark"){

document.body.classList.add("dark");

}

};

</script>



</body>

</html>
