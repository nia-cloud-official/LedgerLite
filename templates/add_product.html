{% extends "base.html" %}

{% block content %}

<style>

:root {
    --bg: #0b1220;
    --surface: rgba(255,255,255,0.03);
    --surface-hover: rgba(255,255,255,0.06);
    --border: rgba(255,255,255,0.08);
    --text: #e5e7eb;
    --muted: #9ca3af;
    --primary: #3b82f6;
    --danger: #ef4444;
    --success: #22c55e;
}

/* PAGE */
body {
    background:
        radial-gradient(circle at 20% 10%, rgba(59,130,246,0.10), transparent 45%),
        radial-gradient(circle at 80% 80%, rgba(34,197,94,0.08), transparent 40%),
        var(--bg);
    color: var(--text);
}

/* CENTER CARD */
.form-wrapper {
    max-width: 520px;
    margin: auto;
}

/* CARD */
.form-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 18px;
    backdrop-filter: blur(14px);
    padding: 24px;
    transition: 0.2s ease;
}

.form-card:hover {
    background: var(--surface-hover);
}

/* TITLE */
h2 {
    font-weight: 800;
    margin-bottom: 4px;
}

/* TEXT */
p {
    color: var(--muted);
}

/* LABEL */
label {
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 6px;
}

/* INPUTS */
.form-control {
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 10px;
    padding: 10px;
}

.form-control:focus {
    border-color: var(--primary);
    box-shadow: 0 0 0 3px rgba(59,130,246,0.15);
    background: rgba(255,255,255,0.06);
    color: white;
}

.form-control::placeholder {
    color: rgba(229,231,235,0.35);
}

/* BUTTONS */
.btn-primary-action {
    background: linear-gradient(135deg,#3b82f6,#1d4ed8);
    border: none;
    border-radius: 12px;
    padding: 10px 18px;
    font-weight: 600;
    color: white;
    transition: 0.2s ease;
}

.btn-primary-action:hover {
    transform: translateY(-2px);
}

/* CANCEL */
.btn-cancel {
    background: transparent;
    border: 1px solid rgba(239,68,68,0.4);
    color: #f87171;
    border-radius: 12px;
    padding: 10px 18px;
    font-weight: 600;
    transition: 0.2s ease;
}

.btn-cancel:hover {
    background: rgba(239,68,68,0.12);
}

/* HEADER SPACING */
.header {
    margin-bottom: 20px;
}

</style>

<div class="form-wrapper">

    <div class="form-card">

        <!-- HEADER -->
        <div class="header">
            <h2>Add Product</h2>
            <p>Create a new inventory item</p>
        </div>

        <form method="POST">
            {% csrf_token %}

            <div class="mb-3">
                <label>Product Name</label>
                <input type="text"
                       name="name"
                       class="form-control"
                       placeholder="e.g Coca Cola"
                       required>
            </div>

            <div class="mb-3">
                <label>Price</label>
                <input type="number"
                       step="0.01"
                       min="0"
                       name="price"
                       class="form-control"
                       placeholder="0.00"
                       required>
            </div>

            <div class="mb-4">
                <label>Stock Quantity</label>
                <input type="number"
                       min="0"
                       name="stock"
                       class="form-control"
                       placeholder="0"
                       required>
            </div>

            <div class="d-flex justify-content-between">

                <a href="{% url 'products' %}" class="btn btn-cancel">
                    Cancel
                </a>

                <button type="submit" class="btn btn-primary-action">
                    Save Product
                </button>

            </div>

        </form>

    </div>

</div>

{% endblock %}
